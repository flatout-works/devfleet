name: Chetter

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check chetter
        run: make check

  arcane-sync:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Trigger Arcane GitOps sync
        env:
          ARCANE_CHETTER_GITSYNC_URL: ${{ secrets.ARCANE_CHETTER_GITSYNC_URL }}
          ARCANE_CHETTER_REDEPLOY_URL: ${{ secrets.ARCANE_CHETTER_REDEPLOY_URL }}
        run: |
          url="${ARCANE_CHETTER_GITSYNC_URL:-$ARCANE_CHETTER_REDEPLOY_URL}"
          if [ -z "$url" ]; then
            echo "::notice::Arcane webhook secret is not configured; skipping Arcane sync"
            exit 0
          fi
          curl --fail --silent --show-error --max-time 180 --request POST "$url" >/dev/null
