services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: chetter
      MYSQL_USER: chetter
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chetter}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-chetter-root}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u chetter -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

  chetter-mcp:
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      DATABASE_DSN: ${DATABASE_DSN:-chetter:${MYSQL_PASSWORD:-chetter}@tcp(mysql:3306)/chetter?parseTime=true}

volumes:
  mysql-data:
