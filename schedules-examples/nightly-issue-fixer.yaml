# Sample schedule: nightly issue fixer
#
# Picks a well-scoped open issue and implements a fix automatically.
#
# Customize before enabling:
#   git_url      - your repository URL
#   git_ref      - branch to work from (usually main)
#   agent_image  - runner image (get from your Chetter admin or build your own)
#   timeout_sec  - adjust based on typical fix complexity
#   prompt       - adapt issue labels and build/test commands to your project
#
# To create: chetter_schedule_task with these fields.
# To change later: chetter_update_schedule with changed fields.

name: nightly-issue-fixer
enabled: false
cron_expr: "30 3 * * *"
git_url: https://github.com/your-org/your-repo
git_ref: main
agent_image: ghcr.io/your-org/chetter-runner:main
provider_id: deepseek
model_id: deepseek-chat
timeout_sec: 3600
prompt: |-
  Look at open GitHub issues in the target repository, choose one clearly
  actionable and scoped issue, implement a fix, and create a pull request.

  Procedure:

  1. List open issues:

         gh issue list --state open --limit 20 --json number,title,labels,body,state

  2. Pick one issue that:
     - has a clear, well-defined scope
     - can be implemented and verified within the available time
     - does not require broad design decisions, credentials, infrastructure
       changes, or cross-repository coordination

  3. If no suitable issue exists, report that and exit without creating a PR.

  4. For the selected issue, read the relevant code, implement the smallest
     correct fix, and run the repository's relevant tests or checks.

  5. Create a branch named `fix/issue-NNN-short-description`, commit with a
     message that references the issue, push, and open a pull request against
     `main`.

  Do not push directly to `main`. Do not change files unrelated to the issue.
  Add this footer to the pull request description, resolving the environment
  variables $CHETTER_AGENT_NAME, $CHETTER_MODEL_ID, $CHETTER_RUNNER_IMAGE,
  and $CHETTER_RUNNER_IMAGE_DIGEST:

      ---
      Generated by [Chetter](https://github.com/flatout-works/chetter)
      Agent: $CHETTER_AGENT_NAME | Model: $CHETTER_MODEL_ID | Runner: $CHETTER_RUNNER_IMAGE ($CHETTER_RUNNER_IMAGE_DIGEST)
