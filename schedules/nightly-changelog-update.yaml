# Sample schedule: nightly changelog update
#
# Customize before enabling:
#   git_url      - your repository URL
#   git_ref      - branch to work from (usually main)
#   agent_image  - runner image (get from your Chetter admin or build your own)
#   agent        - optional: custom changelog agent if you have one
#   timeout_sec  - adjust based on repo size
#   prompt       - adapt the changelog style to your project conventions
#
# To sync: chetter_sync_schedules("schedules/")
# Or individually: chetter_schedule_task with these fields.

name: nightly-changelog-update
enabled: false
cron_expr: "0 3 * * *"
git_url: https://github.com/your-org/your-repo
git_ref: main
agent_image: ghcr.io/your-org/chetter-runner:main
agent: changelog-maintainer
timeout_sec: 3600
prompt: |-
  Maintain the repository's root `CHANGELOG.md` from recent changes.

  Review the last 24 hours of commit history:

      git log --since="24 hours ago" --no-merges --pretty=format:"%h %ad %s" --date=iso

  Inspect the actual changes, not only commit subjects. Use `git show --stat`,
  `git show --name-only`, and targeted diffs as needed.

  Update `CHANGELOG.md` only when there are user-visible, developer-facing,
  operational, or documentation changes worth recording. Use factual entries;
  do not invent capabilities or add marketing copy. Skip purely mechanical
  churn unless it affects users, operators, contributors, or release notes.

  If `CHANGELOG.md` is created or modified, create a branch named
  `docs/update-changelog-YYYY-MM-DD`, commit with message
  `docs: update changelog from recent history`, push, and open a pull request
  against `main`.

  Add this footer to the pull request description, resolving the environment
  variables $CHETTER_AGENT_NAME, $CHETTER_MODEL_ID, $CHETTER_RUNNER_IMAGE,
  and $CHETTER_RUNNER_IMAGE_DIGEST:

      ---
      Generated by [Chetter](https://github.com/flatout-works/chetter)
      Agent: $CHETTER_AGENT_NAME | Model: $CHETTER_MODEL_ID | Runner: $CHETTER_RUNNER_IMAGE ($CHETTER_RUNNER_IMAGE_DIGEST)

  If there are no changelog-worthy changes, leave files unchanged and report
  that no update was needed. Do not push directly to `main`.
