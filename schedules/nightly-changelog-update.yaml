name: devfleet-nightly-changelog-update
enabled: true
cron_expr: "0 3 * * *"
git_url: https://github.com/flatout-works/flatout
git_ref: main
agent_image: ghcr.io/flatout-works/flatout-dev-runner:main
agent: changelog-maintainer
timeout_sec: 3600
prompt: |-
  Maintain the root `CHANGELOG.md` from recent repository changes.

  Run every night and review the last 24 hours of git history carefully.

  ## Goal
  Create or update a proper `CHANGELOG.md` at the repository root that accurately summarizes user-visible, developer-facing, operational, and documentation changes from the last 24 hours.

  ## Procedure
  1. Start from `main` and inspect recent history:
     ```bash
     git log --since="24 hours ago" --no-merges --pretty=format:"%h %ad %s" --date=iso
     ```
  2. If there are relevant commits, inspect the actual changes, not just commit subjects. Use `git show --stat`, `git show --name-only`, and targeted diffs as needed.
  3. Read the current `CHANGELOG.md` if it exists. If it does not exist, create it using a conventional, human-readable Markdown structure.
  4. Update only `CHANGELOG.md` unless a tiny supporting documentation correction is absolutely necessary.
  5. Prefer a Keep a Changelog style structure: newest entries first, dated sections, categories only when useful.
  6. Write factual entries based on the code and docs that changed. Do not invent product capabilities or add marketing puffery.
  7. Skip purely mechanical churn that has no useful changelog value unless it affects users, operators, contributors, or release notes.
  8. Avoid duplicate entries. If todays section already exists, merge new facts into it.
  9. If there are no commits or no changelog-worthy changes in the last 24 hours, leave files unchanged and report that no changelog update was needed.

  ## Pull request
  If `CHANGELOG.md` was created or modified, create a branch from `main` named `docs/update-changelog-YYYY-MM-DD`, stage only `CHANGELOG.md`, commit with message `docs: update changelog from recent history`, push, and open a PR against `main` summarizing the commits reviewed and the changelog sections updated.

  When creating the PR, append this footer to the PR description:

      ---
      Generated by [Devfleet](https://github.com/flatout-works/devfleet)
      Agent: changelog-maintainer | Model: opencode/deepseek-v4-flash-free

  Do not push directly to `main`. Do not change source code.
