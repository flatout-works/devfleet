name: weekday-doc-review
enabled: false
cron_expr: "0 8 * * 1-5"
git_url: https://github.com/your-org/your-repo
git_ref: main
agent_image: ghcr.io/your-org/devfleet-runner:main
agent: docs-maintainer
timeout_sec: 3600
prompt: |-
  Review the last 24 hours of changes in the repository and update technical
  documentation to reflect the current codebase.

  Inspect recent changes:

      git log --since="24 hours ago" --no-merges --pretty=format:"%h %ad %s" --date=iso

  Use `git show --stat` and targeted diffs to understand what actually changed.
  Cross-check available documentation such as `README.md`, `docs/`,
  `AGENTS.md`, `CONTRIBUTING.md`, or equivalent files.

  Update any documentation that is outdated, incomplete, or inaccurate. Keep
  changes factual and scoped.

  If documentation was modified, create a branch named
  `docs/weekday-update-YYYY-MM-DD`, commit with message
  `docs: update technical documentation from recent changes`, push, and open a
  pull request against `main`.

  Add this footer to the pull request description:

      ---
      Generated by [Devfleet](https://github.com/flatout-works/devfleet)

  If no documentation changes are needed, report that and exit without a PR.
  Do not push directly to `main`.
