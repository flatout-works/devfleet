name: devfleet-weekday-doc-review
enabled: true
cron_expr: "0 8 * * 1-5"
git_url: https://github.com/flatout-works/flatout
git_ref: main
agent_image: ghcr.io/flatout-works/flatout-dev-runner:main
provider_id: synthetic
model_id: hf:moonshotai/Kimi-K2.6
timeout_sec: 3600
prompt: |-
  Review the last 24 hours of changes in the repository and update technical documentation to accurately reflect the current codebase.

  ## Procedure

  1. Inspect recent changes:
     ```bash
     git log --since="24 hours ago" --no-merges --pretty=format:"%h %ad %s" --date=iso
     ```
     Use `git show --stat` and targeted diffs to understand what actually changed.

  2. Cross-check against the docs directory:
     - `docs/` — product, business, architecture, process documentation
     - `AGENTS.md` — engineering context and conventions
     - `README.md` — repo-level overview

  3. Update any documentation that is now outdated, incomplete, or inaccurate. Write factual entries based on what the code actually does. Do not describe planned work as shipped.

  4. Follow existing doc conventions: keep the same structure, tone, and formatting. Make the smallest accurate changes.

  ## Pull request

  If any documentation was modified, create a branch from `main` named `docs/weekday-update-YYYY-MM-DD`, stage only the changed doc files, commit with message `docs: update technical documentation from recent changes`, push, and open a PR against `main` with a brief summary of what was updated and why.

  When creating the PR, append this footer to the PR description:

      ---
      Generated by [Devfleet](https://github.com/flatout-works/devfleet)
      Agent: docs-maintainer | Model: synthetic/hf:moonshotai/Kimi-K2.6

  If no documentation changes are needed, report that and exit without a PR. Do not push directly to `main`.
