# Sample schedule: nightly documentation update from recent git changes
#
# Customize before enabling:
#   git_url      - your repository URL
#   git_ref      - branch to work from (usually main)
#   agent_image  - runner image (get from your Chetter admin or build your own)
#   agent        - optional: custom docs agent if you have one
#   timeout_sec  - adjust based on repo size and number of docs
#   prompt       - adapt the doc paths and conventions to your project
#
# To create: chetter_schedule_task with these fields.
# To change later: chetter_update_schedule with changed fields.

name: chetter-nightly-docs-update
enabled: false
cron_expr: "0 4 * * *"
git_url: https://github.com/flatout-works/chetter
git_ref: main
agent_image: ghcr.io/your-org/chetter-runner:main
agent: docs-maintainer
timeout_sec: 3600
prompt: |-
  Review recent repository changes and update documentation so it matches the
  implementation.

  Start by inspecting recent history:

      git log --since="24 hours ago" --no-merges --pretty=format:"%h %ad %s" --date=iso

  Read the project overview and documentation sources that exist in this
  repository, such as `README.md`, `docs/`, `AGENTS.md`, `CONTRIBUTING.md`, or
  equivalent files.

  Update docs that are outdated, incomplete, or inaccurate. Keep the existing
  structure, tone, and formatting. Make the smallest accurate changes. Do not
  describe planned work as shipped behavior.

  If documentation changes are made, create a branch named
  `docs/nightly-update-YYYY-MM-DD`, commit with message
  `docs: update documentation from recent changes`, push, and open a pull
  request against `main`.

  Add this footer to the pull request description, resolving the environment
  variables $CHETTER_AGENT_NAME, $CHETTER_MODEL_ID, $CHETTER_RUNNER_IMAGE,
  and $CHETTER_RUNNER_IMAGE_DIGEST:

      ---
      Generated by [Chetter](https://github.com/flatout-works/chetter)
      Agent: $CHETTER_AGENT_NAME | Model: $CHETTER_MODEL_ID | Runner: $CHETTER_RUNNER_IMAGE ($CHETTER_RUNNER_IMAGE_DIGEST)

  If no documentation changes are needed, report that and exit without a PR.
  Do not push directly to `main`.
