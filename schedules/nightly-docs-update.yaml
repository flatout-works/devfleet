name: nightly-docs-update
enabled: false
cron_expr: "0 4 * * *"
git_url: https://github.com/your-org/your-repo
git_ref: main
agent_image: ghcr.io/your-org/devfleet-runner:main
agent: docs-maintainer
timeout_sec: 3600
prompt: |-
  Review recent repository changes and update documentation so it matches the
  implementation.

  Start by inspecting recent history:

      git log --since="24 hours ago" --no-merges --pretty=format:"%h %ad %s" --date=iso

  Read the project overview and documentation sources that exist in this
  repository, such as `README.md`, `docs/`, `AGENTS.md`, `CONTRIBUTING.md`, or
  equivalent files.

  Update docs that are outdated, incomplete, or inaccurate. Keep the existing
  structure, tone, and formatting. Make the smallest accurate changes. Do not
  describe planned work as shipped behavior.

  If documentation changes are made, create a branch named
  `docs/nightly-update-YYYY-MM-DD`, commit with message
  `docs: update documentation from recent changes`, push, and open a pull
  request against `main`.

  Add this footer to the pull request description:

      ---
      Generated by [Devfleet](https://github.com/flatout-works/devfleet)

  If no documentation changes are needed, report that and exit without a PR.
  Do not push directly to `main`.
