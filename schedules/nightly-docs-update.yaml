name: devfleet-nightly-docs-update
enabled: true
cron_expr: "0 4 * * *"
git_url: https://github.com/flatout-works/flatout
git_ref: main
agent_image: ghcr.io/flatout-works/flatout-dev-runner:main
agent: docs-maintainer
timeout_sec: 3600
prompt: |-
  Review all changes made to the repository in the last 24 hours and update the website, investor presentation, and technical architecture presentation so they accurately reflect the current state of the product.

  ## Step 1: Understand what changed
  Run:
  ```bash
  git log --since="24 hours ago" --pretty=format:"%h %s" --all
  ```

  ## Step 2: Read current marketing materials
  Read these files to understand the current messaging:
  - `website/index.html` — The public marketing website
  - `website/styles.css` — Website styles
  - `presentation/index.html` — Investor/product presentation deck
  - `presentation/styles.css` — Presentation styles
  - `presentation2/index.html` — Technical architecture presentation
  - `presentation2/styles.css` — Technical presentation styles

  Also read source-of-truth docs: `README.md`, `AGENTS.md`, `docs/PRODUCT.md`, `docs/BUSINESS.md`.

  ## Step 3: Update the website
  Update `website/index.html` to accurately describe current product capabilities, tech stack, architecture, and any new features. Keep the same visual design language (Tailwind CSS, existing color scheme, branding).

  ## Step 4: Update the investor presentation
  Update `presentation/index.html` to correctly list current product capabilities and architecture. Keep the existing slide deck structure and visual style.

  ## Step 5: Update the technical architecture presentation
  Update `presentation2/index.html` to accurately reflect the current system architecture and technologies in use. Keep the existing slide deck structure and visual style.

  ## Step 6: Commit and create PR
  Commit all changes to a new branch named `nightly-docs-update-{YYYY-MM-DD}`, push, and create a GitHub PR against `main` with a summary of what was updated and why.

  When creating the PR, append this footer to the PR description:

      ---
      Generated by [Devfleet](https://github.com/flatout-works/devfleet)
      Agent: docs-maintainer | Model: opencode/deepseek-v4-flash-free

  Do NOT push directly to main. Keep changes focused on documentation/marketing accuracy only. If no significant changes occurred, still review materials for accuracy and create a PR noting "no material changes — verified accuracy".
