# Sample schedule: code quality audit
#
# Scrubs the codebase for DRY violations, long functions, hardcoded values,
# unclear naming, missing error wrapping, and dead code.
#
# Customize before enabling:
#   git_url      - your repository URL
#   git_ref      - branch to work from (usually main)
#   agent_image  - runner image (get from your Devfleet admin or build your own)
#   agent        - optional: custom code-quality agent if you have one
#   timeout_sec  - adjust based on codebase size (large repos need more time)
#   prompt       - adapt the source directories and quality criteria to your project
#
# To sync: devfleet_sync_schedules("schedules/")
# Or individually: devfleet_schedule_task with these fields.

name: code-quality-audit-daily
enabled: false
cron_expr: "0 2 * * *"
git_url: https://github.com/your-org/your-repo
git_ref: main
agent_image: ghcr.io/your-org/devfleet-runner:main
agent: code-quality-auditor
timeout_sec: 7200
prompt: |-
  Perform a focused code quality audit across the target repository.

  Look for concrete, low-risk improvements:
  - duplicated logic
  - overly long functions
  - unclear names
  - hardcoded values that should be constants
  - missing error context
  - dead code or unused imports
  - inconsistent logging, timeout, or validation patterns

  Keep changes minimal and behavior-preserving. Do not change public APIs,
  data formats, database schemas, generated files, or unrelated code.

  Run the repository's relevant tests or checks before committing. If no safe
  improvement is found, report that and exit without creating a PR.

  If changes are made, create a branch named `maintenance/code-quality-audit`,
  commit the changes, push the branch, and open a pull request against `main`.

  Add this footer to the pull request description, resolving the environment
  variables $DEVFLEET_AGENT_NAME, $DEVFLEET_MODEL_ID, $DEVFLEET_RUNNER_IMAGE,
  and $DEVFLEET_RUNNER_IMAGE_DIGEST:

      ---
      Generated by [Devfleet](https://github.com/flatout-works/devfleet)
      Agent: $DEVFLEET_AGENT_NAME | Model: $DEVFLEET_MODEL_ID | Runner: $DEVFLEET_RUNNER_IMAGE ($DEVFLEET_RUNNER_IMAGE_DIGEST)

  Do not push directly to `main`.
