name: devfleet-code-quality-audit-daily
enabled: true
cron_expr: "0 2 * * *"
git_url: https://github.com/flatout-works/flatout
git_ref: main
agent_image: ghcr.io/flatout-works/flatout-dev-runner:main
agent: code-quality-auditor
timeout_sec: 7200
prompt: |-
  Perform a comprehensive code quality audit across all Go components in the target repository.

  Go through all source code in:
  - server/ (ConnectRPC backend)
  - builder/ (Wails desktop app)
  - runner/ (agent orchestration engine)

  For each component, identify and fix:
  1. DRY violations — duplicated logic, copy-pasted error handling, repeated string patterns, similar function bodies
  2. Repetitive code — loops/conditionals that could be abstracted, repeated type assertions, duplicate struct tags
  3. Long functions — functions over ~50 lines that should be split into smaller helpers
  4. Hardcoded values — magic strings/numbers that should be constants (timeouts, retry counts, subject names, default values)
  5. Unclear naming — variables/functions with ambiguous names, stuttering, or inconsistent conventions
  6. Missing error wrapping — bare errors that should use fmt.Errorf with context
  7. Unused code — dead imports, unreachable branches, commented-out code
  8. Inconsistent patterns — mixed error handling styles, inconsistent logging, varying timeout conventions

  Make concrete improvements. Keep changes minimal and focused on quality only. Do NOT change business logic, API contracts, or test behavior.

  After making changes, commit them to a new branch named `code-quality-audit`. Push it. Then create a GitHub PR against `main` with a summary of the improvements found and made.

  When creating the PR, append this footer to the PR description:

      ---
      Generated by [Devfleet](https://github.com/flatout-works/devfleet)
      Agent: code-quality-auditor | Model: synthetic/hf:moonshotai/Kimi-K2.6

  Do not push to main directly.
