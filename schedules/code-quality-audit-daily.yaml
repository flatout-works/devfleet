name: code-quality-audit-daily
enabled: false
cron_expr: "0 2 * * *"
git_url: https://github.com/your-org/your-repo
git_ref: main
agent_image: ghcr.io/your-org/devfleet-runner:main
agent: code-quality-auditor
timeout_sec: 7200
prompt: |-
  Perform a focused code quality audit across the target repository.

  Look for concrete, low-risk improvements:
  - duplicated logic
  - overly long functions
  - unclear names
  - hardcoded values that should be constants
  - missing error context
  - dead code or unused imports
  - inconsistent logging, timeout, or validation patterns

  Keep changes minimal and behavior-preserving. Do not change public APIs,
  data formats, database schemas, generated files, or unrelated code.

  Run the repository's relevant tests or checks before committing. If no safe
  improvement is found, report that and exit without creating a PR.

  If changes are made, create a branch named `maintenance/code-quality-audit`,
  commit the changes, push the branch, and open a pull request against `main`.

  Add this footer to the pull request description:

      ---
      Generated by [Devfleet](https://github.com/flatout-works/devfleet)

  Do not push directly to `main`.
