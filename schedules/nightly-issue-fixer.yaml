name: nightly-issue-fixer
enabled: false
cron_expr: "30 3 * * *"
git_url: https://github.com/your-org/your-repo
git_ref: main
agent_image: ghcr.io/your-org/devfleet-runner:main
provider_id: deepseek
model_id: deepseek-chat
timeout_sec: 3600
prompt: |-
  Look at open GitHub issues in the target repository, choose one clearly
  actionable and scoped issue, implement a fix, and create a pull request.

  Procedure:

  1. List open issues:

         gh issue list --state open --limit 20 --json number,title,labels,body,state

  2. Pick one issue that:
     - has a clear, well-defined scope
     - can be implemented and verified within the available time
     - does not require broad design decisions, credentials, infrastructure
       changes, or cross-repository coordination

  3. If no suitable issue exists, report that and exit without creating a PR.

  4. For the selected issue, read the relevant code, implement the smallest
     correct fix, and run the repository's relevant tests or checks.

  5. Create a branch named `fix/issue-NNN-short-description`, commit with a
     message that references the issue, push, and open a pull request against
     `main`.

  Do not push directly to `main`. Do not change files unrelated to the issue.
