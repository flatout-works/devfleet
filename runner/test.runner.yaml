nats:
  url: nats://localhost:4222

runner:
  listen_subject: chetter.test.tasks
  result_subject: chetter.test.results
  workspace_root: /tmp/chetter-test-runner
  max_concurrent: 2

proxy:
  listen_addr: :28080
  allowed_domains:
    - api.openai.com
    - api.anthropic.com
    - api.groq.com
    - api.mistral.ai
    - html.duckduckgo.com
    - lite.duckduckgo.com
    - www.google.com
    - bing.com
    - raw.githubusercontent.com
    - github.com
    - docs.python.org
    - pkg.go.dev
    - developer.mozilla.org
    - api.mem9.ai
    - api.osv.dev
  blocked_domains:
    - webhook.site
    - requestbin.com
    - paste.opendev.org
    - pastebin.com
    - discord.com
    - hooks.slack.com
    - zpr.io

dns:
  listen_addr: :53
  upstream: 8.8.8.8:53
  blocked_domains:
    - metadata.google.internal
    - instance-data
    - 169.254.169.254

workspace: {}

git:
  ssh_key_path: ""
  pat: ""

chetter_mcp:
  url: ""
  auth_token: ""
